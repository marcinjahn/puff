name: Tests

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - name: Check formatting
        run: just format-check
      - name: Run clippy
        run: just lint

  # Tests run on one architecture per OS. Additional architectures are released
  # (see github-release.yml) but don't need separate test runs — OS-level behavior
  # (filesystem, symlinks, paths) is where bugs hide, not in CPU architecture differences.
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - name: Run unit tests
        run: just test-unit

  e2e-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core --depth=1
          sudo /tmp/bats-core/install.sh /usr/local
      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core
      - name: Install bats (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/bats-core/bats-core.git "$HOME/bats-core" --depth=1
          # Git for Windows 2.54 (in the windows-2025 runner image since late
          # April 2026) ships a Bash that self-identifies as Cygwin, so $PWD
          # stays in Windows form (D:/...) and ends up in BATS_TEST_DIRNAME.
          # bats's bats_internal_load rejects any path whose first char isn't
          # '/', so `load helpers` fails. The usual `cd -P .` workaround
          # doesn't help here because just (a Rust binary) re-sets PWD when
          # spawning the recipe shell. Patch the check to also accept
          # drive-letter absolute paths (D:/...). See git-for-windows/git#6195.
          sed -i 's|"${library_load_path:0:1}" != /|"${library_load_path:0:1}" != / \&\& "${library_load_path:1:2}" != ":/"|' "$HOME/bats-core/lib/bats-core/test_functions.bash"
          echo "$HOME/bats-core/bin" >> "$GITHUB_PATH"
      - name: Run e2e tests
        run: just test-e2e

  script-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - name: Install bats
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core --depth=1
          sudo /tmp/bats-core/install.sh /usr/local
      - name: Run script tests
        run: just test-scripts
