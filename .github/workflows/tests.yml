name: Tests

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - name: Check formatting
        run: just format-check
      - name: Run clippy
        run: just lint

  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - name: Run unit tests
        run: just test-unit

  e2e-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core --depth=1
          sudo /tmp/bats-core/install.sh /usr/local
      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core
      - name: Install bats (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/bats-core/bats-core.git "$HOME/bats-core" --depth=1
          echo "$HOME/bats-core/bin" >> "$GITHUB_PATH"
      - name: Run e2e tests
        run: just test-e2e

  script-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@just
      - name: Install bats
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core --depth=1
          sudo /tmp/bats-core/install.sh /usr/local
      - name: Run script tests
        run: just test-scripts
