name: Update Homebrew Formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.2.0)"
        required: true
  workflow_call:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.2.0)"
        required: true
        type: string

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}

      - name: Check out Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: marcinjahn/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          tag="${{ inputs.tag }}"
          formula="Formula/puff.rb"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            url="https://github.com/marcinjahn/puff/releases/download/${tag}/puff-${tag}-${target}.zip"
            sha256=$(curl -sfL "${url}.sha256" | awk '{print $1}')

            sed -i "s|url \".*${target}.*\"|url \"${url}\"|" "$formula"
            sed -i "/url \".*${target}.*\"/{n; s/sha256 \".*\"/sha256 \"${sha256}\"/;}" "$formula"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/puff.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "puff ${{ steps.version.outputs.version }}"
          git push
