name: Update Homebrew Formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.2.0)"
        required: true

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}

      - name: Download source tarball and compute SHA256
        id: sha
        run: |
          url="https://github.com/marcinjahn/puff/archive/refs/tags/${{ inputs.tag }}.tar.gz"
          sha256=$(curl -sL "$url" | sha256sum | awk '{print $1}')
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Check out Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: marcinjahn/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          sed -i 's|url ".*"|url "${{ steps.sha.outputs.url }}"|' Formula/puff.rb
          sed -i 's|sha256 ".*"|sha256 "${{ steps.sha.outputs.sha256 }}"|' Formula/puff.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/puff.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "puff ${{ steps.version.outputs.version }}"
          git push
